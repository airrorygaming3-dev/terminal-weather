<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacker Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #000000;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            justify-content: space-between;
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        /* --- STAGE 1: APP STARTUP LOADING --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px dashed #00ff00;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #00ff00;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9998;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .login-box {
            background: #050505;
            padding: 25px;
            border: 1px dashed #00ff00;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 320px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            background: #000000;
            border: 1px solid #00aa00;
            color: #00ff00;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 15px;
            outline: none;
            border-radius: 6px;
        }

        .login-box input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        .login-box button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #003300;
            border: 1px solid #00ff00;
            color: #ffffff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .login-box button:active {
            background: #00ff00;
            color: #000000;
        }

        #login-error {
            color: #ff0000;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* --- STAGE 2: HACKER DECODING SYSTEM LOADING (AFTER PASSWORD) --- */
        #hacker-loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9997;
            padding: 24px;
            transition: opacity 0.4s ease;
        }

        .hack-container {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        .radar-scanner {
            width: 80px;
            height: 80px;
            border: 3px solid transparent;
            border-top: 3px solid #00ff00;
            border-left: 3px solid #00ff00;
            border-radius: 50%;
            animation: spinRadar 0.8s linear infinite;
            margin: 0 auto 30px auto;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .radar-scanner::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 2px dashed #00aa00;
            border-radius: 50%;
            animation: spinRadarReverse 2s linear infinite;
        }

        @keyframes spinRadar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinRadarReverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .progress-box {
            width: 100%;
            height: 14px;
            background: #021102;
            border: 1px solid #00ff00;
            border-radius: 3px;
            padding: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }

        .status-terminal {
            font-size: 0.85rem;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            letter-spacing: 1px;
            text-transform: uppercase;
            min-height: 20px;
        }

        /* --- MAIN DASHBOARD LAYOUT --- */
        header {
            background-color: #050505;
            text-align: center;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid #00ff00;
            text-shadow: 0 0 8px #00ff00;
        }

        .content-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            overflow-y: auto;
            width: 100%;
        }

        .screen {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            animation: matrixGlitch 0.3s ease-out;
        }

        .screen.active {
            display: block;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 10px #00ff00);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #00ff00;
            font-weight: 700;
            text-shadow: 0 0 10px #00ff00;
        }

        p {
            font-size: 1rem;
            color: #00aa00;
        }

        .welcome-card {
            background: #050505;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 15px;
            border: 1px dashed #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .welcome-card h3 {
            font-size: 1.2rem;
            color: #00ff00;
            margin-bottom: 5px;
        }

        .welcome-card p {
            color: #00aa00;
            font-size: 0.9rem;
        }

        .live-clock {
            font-size: 2.2rem;
            font-weight: 700;
            color: #00ff00;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
        }

        .vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .grid-box {
            background-color: #050505;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #00aa00;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-box span {
            font-size: 1.5rem;
        }

        .box-content {
            display: flex;
            flex-direction: column;
        }

        .grid-box .title {
            font-size: 0.75rem;
            color: #005500;
            text-transform: uppercase;
            font-weight: bold;
        }

        .grid-box .val {
            font-size: 1rem;
            color: #00ff00;
            font-weight: 600;
            margin-top: 2px;
        }

        .calc-container {
            background-color: #050505;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            width: 100%;
        }

        .calc-screen {
            width: 100%;
            height: 55px;
            background-color: #000000;
            border: 1px solid #00aa00;
            border-radius: 6px;
            color: #00ff00;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
            outline: none;
            text-shadow: 0 0 5px #00ff00;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-btn {
            background-color: #050505;
            color: #00ff00;
            border: 1px solid #00aa00;
            padding: 14px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .calc-btn:active {
            background-color: #00ff00;
            color: #000000;
            box-shadow: 0 0 10px #00ff00;
        }

        .calc-btn.operator {
            border-color: #00ff00;
            color: #ffffff;
            background-color: #003300;
        }

        .calc-btn.clear {
            border-color: #ff0000;
            color: #ff0000;
            background-color: #220000;
        }
        
        .calc-btn.clear:active {
            background-color: #ff0000;
            color: #000000;
        }

        nav {
            background-color: #050505;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #00ff00;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            width: 100%;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #00aa00;
            font-size: 0.75rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn.active {
            color: #000000;
            background-color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        @keyframes matrixGlitch {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-size: 0.9rem; letter-spacing: 1px;">LAUNCHING_SYSTEM...</p>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2>SECURE_AUTH</h2>
            <p style="font-size: 0.8rem; margin-top: 5px;">ENTER DECRYPTION KEY</p>
            <input type="password" id="pass-input" placeholder="••••" maxlength="8" inputmode="numeric">
            <button onclick="checkPassword()">VERIFY</button>
            <div id="login-error">ACCESS_DENIED: INVALID_KEY</div>
        </div>
    </div>

    <div id="hacker-loading-screen">
        <div class="hack-container">
            <div class="radar-scanner"></div>
            <div class="progress-box">
                <div class="progress-bar" id="hack-bar"></div>
            </div>
            <div class="status-terminal" id="hack-msg">INITIALIZING_EXPLOIT...</div>
        </div>
    </div>

    <header id="app-title">SYSTEM_CORE:/#</header>

    <div class="content-container">
        <div id="home" class="screen active">
            <div class="welcome-card">
                <h3>ACCESS_GRANTED...</h3>
                <p>Welcome back, Operator.</p>
                <div class="live-clock" id="clock">00:00:00</div>
            </div>
            
            <div class="vertical-stack">
                <div class="grid-box">
                    <span>📡</span>
                    <div class="box-content">
                        <div class="title">METEO_DATA</div>
                        <div class="val" id="home-temp">--°C, LOADING</div>
                    </div>
                </div>
                <div class="grid-box">
                    <span>⚡</span>
                    <div class="box-content">
                        <div class="title">CALC_MOD</div>
                        <div class="val">ONLINE</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="weather" class="screen">
            <span class="icon" id="weather-icon">📡</span>
            <h2 id="live-temp">--°C</h2>
            <p id="live-status">FETCHING_DATA...</p>
            <p style="font-size: 0.85rem; color: #005500; margin-top: 8px;" id="live-city">LOC: MUMBAI, IN</p>
        </div>

        <div id="date" class="screen">
            <span class="icon">📟</span>
            <h2 id="current-date">FETCHING...</h2>
            <p id="current-day">FETCHING...</p>
        </div>

        <div id="calculator" class="screen">
            <div class="calc-container">
                <input type="text" class="calc-screen" id="calc-display" readonly value="0">
                <div class="calc-grid">
                    <button class="calc-btn clear" onclick="clearCalc()">C</button>
                    <button class="calc-btn" onclick="pressCalc('/')">/</button>
                    <button class="calc-btn" onclick="pressCalc('*')">*</button>
                    <button class="calc-btn operator" onclick="pressCalc('-')">-</button>
                    
                    <button class="calc-btn" onclick="pressCalc('7')">7</button>
                    <button class="calc-btn" onclick="pressCalc('8')">8</button>
                    <button class="calc-btn" onclick="pressCalc('9')">9</button>
                    <button class="calc-btn operator" onclick="pressCalc('+')">+</button>
                    
                    <button class="calc-btn" onclick="pressCalc('4')">4</button>
                    <button class="calc-btn" onclick="pressCalc('5')">5</button>
                    <button class="calc-btn" onclick="pressCalc('6')">6</button>
                    <button class="calc-btn operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
                    
                    <button class="calc-btn" onclick="pressCalc('1')">1</button>
                    <button class="calc-btn" onclick="pressCalc('2')">2</button>
                    <button class="calc-btn" onclick="pressCalc('3')">3</button>
                    
                    <button class="calc-btn" style="grid-column: span 3;" onclick="pressCalc('0')">0</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="switchScreen('home', 'SYSTEM_CORE:/#', this)">HOME</button>
        <button class="nav-btn" onclick="switchScreen('weather', 'ENV_ENV:/#', this)">WEATHER</button>
        <button class="nav-btn" onclick="switchScreen('date', 'CHRONO_LOG:/#', this)">DATE</button>
        <button class="nav-btn" onclick="switchScreen('calculator', 'MATH_PROC:/#', this)">CALCULATOR</button>
    </nav>

    <script>
        const apiKey = '228dc768294f93cfe2425349066baf92'; 
        const city = 'Mumbai,IN'; 
        const correctPassword = "1234"; 

        // Initial launch screen loader timeout
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 400);
            }, 1500);
        });

        // Triggered upon successful verification entry
        function checkPassword() {
            const userInput = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('login-error');

            if(userInput === correctPassword) {
                // Instantly swap login screen to advanced machine loading screen
                document.getElementById('login-screen').style.display = 'none';
                startHackerLoadingSequence();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pass-input').value = '';
            }
        }

        // Post-auth advanced machine initialization sequences
        function startHackerLoadingSequence() {
            const hackScreen = document.getElementById('hacker-loading-screen');
            const progressBar = document.getElementById('hack-bar');
            const progressMsg = document.getElementById('hack-msg');
            
            hackScreen.style.display = 'flex';

            const hackLogs = [
                { progress: 15, text: "DECRYPTING_SYSTEM_KEYS..." },
                { progress: 35, text: "BYPASSING_LOCAL_FIREWALL..." },
                { progress: 60, text: "INJECTING_UTILITY_MODULES..." },
                { progress: 85, text: "FETCHING_METEO_DATAFEED..." },
                { progress: 100, text: "ESTABLISHING_ROOT_ACCESS..." }
            ];

            let logStep = 0;

            const runLoading = setInterval(() => {
                if (logStep < hackLogs.length) {
                    progressBar.style.width = hackLogs[logStep].progress + '%';
                    progressMsg.innerText = hackLogs[logStep].text;
                    logStep++;
                } else {
                    clearInterval(runLoading);
                    // Wrap up loading sequence layout cleanly
                    hackScreen.style.opacity = '0';
                    setTimeout(() => {
                        hackScreen.style.display = 'none';
                        startDashboardEngines();
                    }, 400);
                }
            }, 750); // Controls speed of sequential progress bars
        }

        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function startDashboardEngines() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            }, 1000);

            fetchLiveWeather();
        }

        function switchScreen(screenId, headerTitle, button) {
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('app-title').innerText = headerTitle;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            if(screenId === 'date') updateLiveDate();
            if(screenId === 'weather') fetchLiveWeather();
        }

        function updateLiveDate() {
            const today = new Date();
            document.getElementById('current-date').innerText = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
            document.getElementById('current-day').innerText = today.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
        }

        async function fetchLiveWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
                const data = await response.json();
                
                if(response.ok) {
                    const temp = Math.round(data.main.temp);
                    const condition = data.weather[0].description.toUpperCase();
                    
                    document.getElementById('live-temp').innerText = `${temp}°C`;
                    document.getElementById('live-status').innerText = `SKY_STATUS: ${condition}`;
                    document.getElementById('live-city').innerText = `LOC: ${data.name.toUpperCase()}, ${data.sys.country}`;
                    document.getElementById('home-temp').innerText = `${temp}°C, ${data.weather[0].main.toUpperCase()}`;
                } else {
                    document.getElementById('live-status').innerText = 'FETCH_FAILED';
                    document.getElementById('home-temp').innerText = 'ERROR, FETCH_FAILED';
                }
            } catch (err) {
                document.getElementById('live-status').innerText = 'NETWORK_OFFLINE';
                document.getElementById('home-temp').innerText = 'OFFLINE';
            }
        }

        // Calculator Module
        let calcDisplay = document.getElementById('calc-display');
        function pressCalc(val) {
            if (calcDisplay.value === '0' || calcDisplay.value === 'ERROR') {
                calcDisplay.value = val;
            } else {
                calcDisplay.value += val;
            }
        }
        function clearCalc() {
            calcDisplay.value = '0';
        }
        function calculate() {
            try {
                calcDisplay.value = Function('"use strict";return (' + calcDisplay.value + ')')();
            } catch (err) {
                calcDisplay.value = 'ERROR';
            }
        }
    </script>
</body>
</html>
